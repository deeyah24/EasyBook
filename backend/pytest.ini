[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests for individual model logic
    integration: Integration tests for API endpoints
    backend: Backend business logic and validation tests
    frontend: Frontend HTML/JS tests
    selenium: Selenium end-to-end browser tests
