version: '3.9'

services:
  db_test:
    image: postgres:15-alpine
    container_name: easybook_db_test
    environment:
      POSTGRES_DB: easybook_test
      POSTGRES_USER: easybook_user
      POSTGRES_PASSWORD: easybook_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybook_user -d easybook_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easybook_backend_test
    environment:
      DATABASE_URL: postgresql://easybook_user:easybook_pass@db_test:5432/easybook_test
      SECRET_KEY: test-secret-key
      FLASK_ENV: testing
      TESTING: "true"
    ports:
      - "5001:5000"
    depends_on:
      db_test:
        condition: service_healthy
    command: python run.py
