version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: easybook_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: easybook
      POSTGRES_USER: easybook_user
      POSTGRES_PASSWORD: easybook_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybook_user -d easybook"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easybook_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://easybook_user:easybook_pass@db:5432/easybook
      SECRET_KEY: super-secret-key-change-in-production
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easybook_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
