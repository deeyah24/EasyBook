<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EasyBook</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/main.css" />
</head>
<body>
<nav class="navbar"><div class="nav-container">
  <a href="index.html" class="nav-logo"><span class="logo-mark">●</span> EasyBook</a>
</div></nav>

<div class="form-page">
  <div class="form-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your appointments.</p>
    <div id="alertContainer"></div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">Sign In</button>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-muted)">
      Don't have an account? <a href="register.html">Create one →</a>
    </p>
  </div>
</div>

<script src="static/js/utils.js"></script>
<script src="static/js/api.js"></script>
<script src="static/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'dashboard.html';

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    clearAlert();
    if (!validateEmail(email)) return showAlert('Enter a valid email address.');
    if (!password) return showAlert('Password is required.');

    setLoading(btn, true, 'Sign In');
    try {
      const data = await api.post('/auth/login', { email, password }, false);
      setSession(data.token, data.user);
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redirect || 'dashboard.html';
    } catch (err) {
      showAlert(err.message || 'Login failed.');
    } finally {
      setLoading(btn, false, 'Sign In');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
