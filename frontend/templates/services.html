<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Services — EasyBook</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/main.css" />
</head>
<body>
<nav class="navbar" id="navbar"><div class="nav-container">
  <a href="index.html" class="nav-logo"><span class="logo-mark">●</span> EasyBook</a>
  <div class="nav-links" id="navLinks">
    <a href="services.html" class="active">Services</a>
    <a href="providers.html">Providers</a>
    <span id="navAuth">
      <a href="login.html" class="btn btn-ghost">Log in</a>
      <a href="register.html" class="btn btn-primary">Get Started</a>
    </span>
    <span id="navUser" style="display:none">
      <a href="dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()" class="btn btn-ghost">Log out</a>
    </span>
  </div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
</div></nav>

<div class="page-header">
  <div class="container">
    <h1>Browse Services</h1>
    <p>Find the perfect service from our verified providers</p>
  </div>
</div>

<div class="filters-bar"><div class="container">
  <div class="filters-inner">
    <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Search services…" oninput="debounceSearch()" />
    <select class="filter-select" id="categoryFilter" onchange="loadServices()">
      <option value="">All Categories</option>
    </select>
    <select class="filter-select" id="sortFilter" onchange="loadServices()">
      <option value="">Sort: Default</option>
      <option value="price_asc">Price: Low → High</option>
      <option value="price_desc">Price: High → Low</option>
    </select>
  </div>
</div></div>

<div class="section"><div class="container">
  <div id="servicesGrid" class="services-grid">
    <div class="service-skeleton"></div>
    <div class="service-skeleton"></div>
    <div class="service-skeleton"></div>
    <div class="service-skeleton"></div>
    <div class="service-skeleton"></div>
    <div class="service-skeleton"></div>
  </div>
  <div id="pagination" class="pagination"></div>
</div></div>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="bookingTitle">Book Appointment</h2>
      <button class="modal-close" onclick="closeModal('bookingModal')">✕</button>
    </div>
    <div id="alertContainer"></div>
    <div id="bookingDetails" style="margin-bottom:1.5rem;padding:1rem;background:var(--bg);border-radius:var(--radius-sm)"></div>
    <div class="form-group">
      <label for="bookDate">Select Date</label>
      <input type="date" id="bookDate" class="form-control" onchange="loadSlots()" />
    </div>
    <div id="slotsSection" style="display:none">
      <label style="font-weight:600;font-size:0.88rem;color:var(--dark)">Available Time Slots</label>
      <div class="slots-grid" id="slotsGrid"></div>
    </div>
    <div class="form-group mt-2">
      <label for="bookNotes">Notes (optional)</label>
      <textarea id="bookNotes" class="form-control" placeholder="Any special requests or information…"></textarea>
    </div>
    <button class="btn btn-primary btn-block" id="confirmBookBtn" onclick="confirmBooking()" style="margin-top:0.5rem">Confirm Booking</button>
  </div>
</div>

<script src="static/js/utils.js"></script>
<script src="static/js/api.js"></script>
<script src="static/js/auth.js"></script>
<script>
  let currentPage = 1;
  let selectedServiceId = null;
  let selectedTime = null;
  let searchTimeout = null;

  document.addEventListener('DOMContentLoaded', async () => {
    initAuth();
    await loadCategoryOptions();
    // Pre-select category from URL
    const urlCat = new URLSearchParams(window.location.search).get('category_id');
    if (urlCat) document.getElementById('categoryFilter').value = urlCat;
    await loadServices();
    // Set min date to today
    document.getElementById('bookDate').min = new Date().toISOString().split('T')[0];
  });

  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 1; loadServices(); }, 400);
  }

  async function loadCategoryOptions() {
    try {
      const cats = await api.get('/categories');
      const sel = document.getElementById('categoryFilter');
      cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`);
    } catch {}
  }

  async function loadServices() {
    const search = document.getElementById('searchInput').value;
    const categoryId = document.getElementById('categoryFilter').value;
    const qs = buildQueryString({ search, category_id: categoryId, page: currentPage, per_page: 9 });
    document.getElementById('servicesGrid').innerHTML = Array(6).fill('<div class="service-skeleton"></div>').join('');
    try {
      const data = await api.get(`/services?${qs}`);
      renderServices(data.services);
      renderPagination(data.pages, data.current_page);
    } catch {
      document.getElementById('servicesGrid').innerHTML = '<p class="text-muted">Could not load services.</p>';
    }
  }

  function renderServices(services) {
    const grid = document.getElementById('servicesGrid');
    if (!services.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">🔍</div>
        <h3>No services found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>`;
      return;
    }
    grid.innerHTML = services.map(buildServiceCard).join('');
  }

  function renderPagination(pages, current) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${current-1})" ${current===1?'disabled':''}>← Prev</button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="page-btn ${i===current?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${current+1})" ${current===pages?'disabled':''}>Next →</button>`;
    el.innerHTML = html;
  }

  function goPage(p) { currentPage = p; loadServices(); window.scrollTo(0,0); }

  async function openBooking(serviceId) {
    if (!isLoggedIn()) { window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
    selectedServiceId = serviceId;
    selectedTime = null;
    document.getElementById('bookDate').value = '';
    document.getElementById('slotsSection').style.display = 'none';
    document.getElementById('bookNotes').value = '';
    document.getElementById('alertContainer').innerHTML = '';

    try {
      const svc = await api.get(`/services/${serviceId}`);
      document.getElementById('bookingTitle').textContent = `Book: ${svc.name}`;
      document.getElementById('bookingDetails').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong>${svc.name}</strong><br/>
            <span class="text-muted" style="font-size:0.85rem">by ${svc.provider_name} · ${formatDuration(svc.duration_minutes)}</span>
          </div>
          <span class="service-price">${formatPrice(svc.price)}</span>
        </div>`;
    } catch {}
    openModal('bookingModal');
  }

  async function loadSlots() {
    const date = document.getElementById('bookDate').value;
    if (!date || !selectedServiceId) return;
    selectedTime = null;
    const section = document.getElementById('slotsSection');
    const grid = document.getElementById('slotsGrid');
    grid.innerHTML = '<div class="spinner"></div>';
    section.style.display = 'block';
    try {
      const data = await api.get(`/services/${selectedServiceId}/slots?date=${date}`);
      if (!data.slots.length) {
        grid.innerHTML = '<p class="text-muted">No availability on this day.</p>';
        return;
      }
      grid.innerHTML = data.slots.map(s => `
        <div class="time-slot ${!s.available?'unavailable':''}" onclick="selectSlot(this,'${s.time}')">
          ${s.time}
        </div>`).join('');
    } catch {
      grid.innerHTML = '<p class="text-muted">Could not load slots.</p>';
    }
  }

  function selectSlot(el, time) {
    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selectedTime = time;
  }

  async function confirmBooking() {
    if (!selectedTime) return showAlert('Please select a time slot.');
    const date = document.getElementById('bookDate').value;
    const notes = document.getElementById('bookNotes').value;
    const btn = document.getElementById('confirmBookBtn');
    setLoading(btn, true, 'Confirm Booking');
    try {
      await api.post('/appointments', {
        service_id: selectedServiceId,
        appointment_date: date,
        start_time: selectedTime,
        notes,
      });
      closeModal('bookingModal');
      alert('✅ Appointment booked! Check your dashboard.');
      window.location.href = 'dashboard.html';
    } catch (err) {
      showAlert(err.message || 'Booking failed.');
    } finally {
      setLoading(btn, false, 'Confirm Booking');
    }
  }
</script>
</body>
</html>
